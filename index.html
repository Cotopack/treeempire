<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TREE COIN</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass top-bar">
    <div class="logo">🌳 TREE COIN</div>
    <div class="stats">
        <div>Balance: <span id="coins">0</span></div>
        <div>+<span id="persec">1</span>/sec</div>
    </div>
</div>

<div id="ton-connect" class="ton-btn"></div>

<div class="controls glass">
    <button id="upgrade">🌱 Upgrade</button>
    <button id="invite">🎁 Invite</button>
    <button id="leaders">🏆 Leaderboard</button>
</div>

<div id="leaderboard" class="leaderboard glass"></div>

<canvas id="game"></canvas>

<script src="game.js"></script>
</body>
</html>
